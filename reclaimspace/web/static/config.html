<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configuration · Reclaimspace</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="config">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">RS</div>
        <div>
          <h1>Reclaimspace</h1>
          <p>Quarantine Plex duplicates · protect Radarr &amp; Sonarr files</p>
        </div>
      </div>
      <nav class="top-nav" aria-label="Main">
        <a href="/" class="nav-link" data-nav="dashboard">Dashboard</a>
        <a href="/config" class="nav-link" data-nav="config">Configuration</a>
      </nav>
      <div class="header-actions">
        <button type="button" id="open-setup-wizard" class="btn secondary btn-sm" title="Re-run first-time setup">
          Setup wizard
        </button>
        <a id="setup-health" class="setup-health hidden" href="/config" title="Setup status"></a>
        <div id="health" class="health-pill" role="status">
          <span class="health-dot"></span>
          <span class="health-text">Checking…</span>
        </div>
      </div>
    </header>

    <main class="layout layout-page">
      <section class="card span-2 card-config" aria-labelledby="config-heading">
        <div class="card-header">
          <div>
            <h2 id="config-heading">Configuration</h2>
            <p class="card-subtitle">Saved to <code>settings.json</code>. Secrets are masked when loaded.</p>
          </div>
          <div class="actions">
            <button type="button" id="rerun-wizard" class="btn secondary btn-sm">Setup wizard</button>
            <button type="button" id="load-plex-sections" class="btn secondary btn-sm">Plex libraries</button>
            <button type="button" id="save-settings" class="btn primary btn-sm">Save</button>
          </div>
        </div>
        <div id="plex-sections" class="plex-sections hidden" role="region" aria-label="Plex libraries"></div>
        <form id="settings-form" class="settings-sections"></form>
        <p id="settings-status" class="toast-area" role="status" aria-live="polite"></p>
      </section>
    </main>

    <footer class="footer">
      <p><a href="/">← Back to dashboard</a></p>
    </footer>

    <script src="/static/wizard.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/settings.js"></script>
    <script src="/static/config-page.js"></script>
  </body>
</html>
